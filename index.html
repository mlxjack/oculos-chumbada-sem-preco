<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Óculos | Chumbada Oficial</title>
    <style>
        :root {
            --primary: #ff4d00; /* Laranja desportivo */
            --primary-hover: #e64500;
            --bg-color: #f4f5f7;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --card-bg: #ffffff;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Header / Hero Section */
        header {
            background-color: #000;
            color: #fff;
            padding: 60px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 6px solid var(--primary);
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255, 255, 255, 0.03) 10px,
                rgba(255, 255, 255, 0.03) 20px
            );
            pointer-events: none;
        }

        h1 {
            font-size: 3.5em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        header p {
            color: #b3b3b3;
            font-size: 1.2em;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        /* Barra de Pesquisa e Filtros */
        .controls-container {
            max-width: 1200px;
            margin: 30px auto 0;
            padding: 0 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(255, 77, 0, 0.15);
        }

        /* Grelha de Produtos */
        .container {
            max-width: 1200px;
            margin: 30px auto 60px;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Cartão de Produto */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }

        .img-container {
            width: 100%;
            height: 260px;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.1) rotate(-2deg);
        }

        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--primary);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
        }

        .card-content {
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .title {
            font-size: 1.2em;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .price {
            font-size: 1.6em;
            color: var(--primary);
            font-weight: 900;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .price span {
            font-size: 0.5em;
            color: var(--text-light);
            font-weight: normal;
            text-decoration: line-through;
        }

        .info {
            font-size: 0.85em;
            color: var(--text-light);
            margin-bottom: 8px;
            margin-top: auto;
            line-height: 1.5;
        }

        .info strong {
            color: var(--text-dark);
            font-weight: 600;
        }

        /* Container do SKU e Botão Copiar */
        .sku-container {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sku {
            font-size: 0.95em;
            color: var(--text-dark);
            font-family: monospace;
            text-transform: uppercase;
        }

        .copy-btn {
            background-color: #f4f5f7;
            border: 1px solid #dcdcdc;
            color: var(--text-dark);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .copy-btn:hover {
            background-color: #e2e2e2;
        }

        .copy-btn.copied {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        /* Mensagem de Sem Resultados */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-light);
            font-size: 1.2em;
            display: none;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            h1 { font-size: 2.5em; }
            header { padding: 40px 20px; }
            .search-bar { width: 100%; }
        }
    </style>
</head>
<body>

</div>

        {"title": "Clip Flip", "model": "Redondo", "price": "34,99", "color": "Preta Degradê", "sku": "63110041001", "img": "images/FLIP22C6.png", "tag": ""}, 
        {"title": "Clip Flip", "model": "Redondo", "price": "34,99", "color": "Rosa Espelhada", "sku": "63110041006", "img": "images/FLIP22C7.png", "tag": ""}, 
        {"title": "Clip Flip", "model": "Redondo", "price": "34,99", "color": "Verde", "sku": "63110041007", "img": "images/FLIP22C1.png", "tag": ""}, 
        {"title": "Clip Flip", "model": "Redondo", "price": "34,99", "color": "Verde Degradê", "sku": "63110041008", "img": "images/FLIP22C4.png", "tag": ""}, 
        {"title": "Clip Flip", "model": "Redondo", "price": "34,99", "color": "Preta", "sku": "63110041005", "img": "images/FLIP22C3.png", "tag": ""}
    ];

    const grid = document.getElementById('productGrid');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');

    // Função de cópia do SKU usando execCommand (Suportado mesmo dentro de iFrames)
    window.copySKU = function(sku, btnElement) {
        if(!sku) return;
        
        // Cria um elemento temporário para cópia
        const tempInput = document.createElement('textarea');
        tempInput.value = sku;
        document.body.appendChild(tempInput);
        
        // Seleciona o conteúdo (mesmo para mobile)
        tempInput.select();
        tempInput.setSelectionRange(0, 99999);
        
        try {
            document.execCommand('copy');
            
            // Efeito visual de sucesso no botão
            const originalHtml = btnElement.innerHTML;
            btnElement.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg> SKU Copiado!
            `;
            btnElement.classList.add('copied');
            
            setTimeout(() => {
                btnElement.innerHTML = originalHtml;
                btnElement.classList.remove('copied');
            }, 2000);
        } catch (err) {
            console.error('Falha ao copiar SKU: ', err);
        }
        
        // Remove o elemento temporário
        document.body.removeChild(tempInput);
    }

    // Função para renderizar os produtos
    function renderProducts(items) {
        grid.innerHTML = ''; 
        
        if (items.length === 0) {
            noResults.style.display = 'block';
            return;
        } else {
            noResults.style.display = 'none';
        }

        items.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const badgeHtml = prod.tag ? `<div class="badge">${prod.tag}</div>` : '';

            card.innerHTML = `
                ${badgeHtml}
                <div class="img-container">
                    <img src="${prod.img}" alt="${prod.title} ${prod.model}" loading="lazy">
                </div>
                <div class="card-content">
                    <div class="sku-container">
                        <div class="sku">SKU: <strong>${prod.sku}</strong></div>
                        <button class="copy-btn" onclick="copySKU('${prod.sku}', this)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copiar SKU
                        </button>
                    </div>
                    <div class="title">${prod.title} <br><small style="color:#ff4d00; font-size: 0.75em;">${prod.model}</small></div>
                    
                    <div class="info"><strong>Detalhes:</strong> ${prod.color}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Renderiza todos os produtos inicialmente (filtrando produtos sem SKU ou imagem quebrada que possam estar no CSV original)
    const validProducts = produtos.filter(p => p.sku);
    renderProducts(validProducts);

    // Sistema de Pesquisa/Filtro
    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        
        const filteredProducts = validProducts.filter(prod => {
            return prod.title.toLowerCase().includes(searchTerm) ||
                   prod.model.toLowerCase().includes(searchTerm) ||
                   prod.color.toLowerCase().includes(searchTerm) ||
                   prod.sku.toLowerCase().includes(searchTerm);
        });
        
        renderProducts(filteredProducts);
    });
</script>
